<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>last30days</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080810;--s1:#0f0f18;--s2:#161625;--s3:#1e1e30;
  --b1:#222235;--b2:#2e2e48;
  --t1:#f0f0ff;--t2:#a0a0c0;--t3:#5a5a80;
  --green:#00ff88;--blue:#4488ff;--orange:#ff8844;--purple:#cc44ff;--red:#ff4466;
  --font:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;
  --mono:"SF Mono","Fira Mono",monospace;
}
html{background:var(--bg);color:var(--t1);font-family:var(--font);font-size:15px}
body{min-height:100dvh;display:flex;flex-direction:column}

/* HEADER */
header{
  position:sticky;top:0;z-index:50;
  background:rgba(8,8,16,.95);backdrop-filter:blur(16px);
  border-bottom:1px solid var(--b1);
  padding:12px 16px;
  display:flex;align-items:center;justify-content:space-between;
}
.logo{font-size:17px;font-weight:800;letter-spacing:-.5px}
.logo em{color:var(--green);font-style:normal}
.hdr-right{display:flex;align-items:center;gap:10px}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
.sync-dot.stale{background:var(--t3);animation:none}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.settings-btn{
  background:none;border:1px solid var(--b1);border-radius:8px;
  color:var(--t2);padding:6px 10px;font-size:16px;cursor:pointer;
  transition:all .15s;
}
.settings-btn:hover{border-color:var(--b2);color:var(--t1)}

/* TICKER */
.ticker{
  overflow-x:auto;white-space:nowrap;scrollbar-width:none;
  padding:10px 16px;border-bottom:1px solid var(--b1);
  background:var(--s1);
  display:flex;gap:20px;align-items:center;
  -webkit-overflow-scrolling:touch;
}
.ticker::-webkit-scrollbar{display:none}
.coin{display:flex;align-items:center;gap:6px;flex-shrink:0}
.coin-sym{font-size:12px;font-weight:700;color:var(--t2)}
.coin-price{font-size:13px;font-weight:600;color:var(--t1);font-variant-numeric:tabular-nums}
.coin-chg{font-size:11px;font-weight:600;padding:2px 5px;border-radius:4px}
.chg-up{color:var(--green);background:rgba(0,255,136,.1)}
.chg-dn{color:var(--red);background:rgba(255,68,102,.1)}
.chg-flat{color:var(--t3);background:rgba(255,255,255,.05)}
.ticker-err{font-size:12px;color:var(--t3)}

/* TABS */
nav.tabs{
  display:flex;overflow-x:auto;scrollbar-width:none;
  background:var(--s1);border-bottom:1px solid var(--b1);
  -webkit-overflow-scrolling:touch;
}
nav.tabs::-webkit-scrollbar{display:none}
.tab{
  flex-shrink:0;padding:11px 18px;
  font-size:13px;font-weight:500;color:var(--t3);
  cursor:pointer;border:none;background:none;
  border-bottom:2px solid transparent;
  transition:color .15s,border-color .15s;
  white-space:nowrap;
}
.tab.active{color:var(--t1);border-bottom-color:var(--cat)}
.tab:hover:not(.active){color:var(--t2)}

/* MAIN */
main{flex:1;padding:16px;max-width:600px;margin:0 auto;width:100%}

/* SECTION LABELS */
.sec-label{
  font-size:10px;font-weight:700;letter-spacing:.1em;
  text-transform:uppercase;color:var(--t3);
  margin:20px 0 10px;
}

/* SENTIMENT WIDGET */
.sentiment-row{
  display:flex;align-items:center;gap:16px;
  background:var(--s1);border:1px solid var(--b1);
  border-radius:12px;padding:16px;
}
.donut-wrap{position:relative;width:70px;height:70px;flex-shrink:0}
.donut-wrap svg{width:100%;height:100%}
.donut-label{
  position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
}
.donut-pct{font-size:15px;font-weight:800;color:var(--t1)}
.donut-word{font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:.05em}
.sentiment-info{flex:1}
.sent-title{font-size:13px;font-weight:600;color:var(--t1);margin-bottom:6px}
.sent-bars{display:flex;flex-direction:column;gap:5px}
.sent-bar-row{display:flex;align-items:center;gap:8px}
.sent-bar-label{font-size:11px;color:var(--t2);width:52px;flex-shrink:0}
.sent-bar-track{flex:1;height:4px;background:var(--s3);border-radius:2px;overflow:hidden}
.sent-bar-fill{height:100%;border-radius:2px;transition:width .4s}
.sent-bar-count{font-size:11px;color:var(--t3);width:20px;text-align:right;flex-shrink:0}

/* RESEARCH CARDS */
.research-list{display:flex;flex-direction:column;gap:8px}
.r-card{
  background:var(--s1);border:1px solid var(--b1);
  border-radius:12px;overflow:hidden;cursor:pointer;
  transition:border-color .15s;
}
.r-card:hover{border-color:var(--b2)}
.r-card.open{border-color:var(--cat)}
.r-header{display:flex;align-items:flex-start;gap:10px;padding:14px}
.r-dot{
  width:8px;height:8px;border-radius:50%;
  background:var(--cat);flex-shrink:0;margin-top:5px;
}
.r-info{flex:1;min-width:0}
.r-name{font-size:14px;font-weight:600;color:var(--t1);line-height:1.3}
.r-date{font-size:11px;color:var(--t3);margin-top:2px}
.r-preview{font-size:12px;color:var(--t2);margin-top:5px;line-height:1.5;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.r-chev{color:var(--t3);font-size:11px;flex-shrink:0;transition:transform .2s;padding-top:4px}
.r-card.open .r-chev{transform:rotate(180deg)}
.r-body{
  display:none;border-top:1px solid var(--b1);padding:14px;
  max-height:55vh;overflow-y:auto;
}
.r-card.open .r-body{display:block}
.r-content{
  font-size:11.5px;color:var(--t2);white-space:pre-wrap;
  font-family:var(--mono);line-height:1.7;
}

/* PROMPTS */
.prompt-grid{display:flex;flex-direction:column;gap:6px}
.p-row{
  display:flex;align-items:center;
  background:var(--s1);border:1px solid var(--b1);
  border-radius:8px;overflow:hidden;
  transition:border-color .15s;
}
.p-row:hover{border-color:var(--b2)}
.p-text{
  flex:1;padding:10px 12px;
  font-family:var(--mono);font-size:12px;color:var(--t2);
  cursor:pointer;user-select:none;
}
.p-copy{
  border:none;border-left:1px solid var(--b1);background:none;
  padding:10px 14px;font-size:11px;color:var(--t3);cursor:pointer;
  white-space:nowrap;transition:all .15s;flex-shrink:0;
}
.p-copy:hover,.p-copy.ok{color:var(--cat);background:rgba(255,255,255,.04)}

/* CUSTOM PROMPT */
.custom-wrap{display:flex;gap:8px;margin-top:8px}
.custom-in{
  flex:1;background:var(--s1);border:1px solid var(--b1);
  border-radius:8px;padding:10px 12px;
  font-family:var(--mono);font-size:12px;color:var(--t1);
  outline:none;transition:border-color .15s;
}
.custom-in::placeholder{color:var(--t3)}
.custom-in:focus{border-color:var(--cat)}
.custom-go{
  flex-shrink:0;background:var(--s2);border:1px solid var(--b1);
  border-radius:8px;padding:10px 14px;cursor:pointer;
  font-size:12px;color:var(--t2);transition:all .15s;
}
.custom-go:hover{border-color:var(--cat);color:var(--t1)}

/* EMPTY */
.empty{text-align:center;padding:40px 24px;color:var(--t3);font-size:13px}
.empty strong{display:block;color:var(--t2);margin-bottom:6px}

/* ── CHAT TAB ── */
.chat-wrap{display:flex;flex-direction:column;height:calc(100dvh - 160px)}
.chat-messages{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:12px;padding-bottom:8px}
.msg{display:flex;gap:8px;align-items:flex-start}
.msg-you{flex-direction:row-reverse}
.msg-bubble{
  max-width:80%;padding:10px 14px;border-radius:14px;
  font-size:13px;line-height:1.55;
}
.msg-you .msg-bubble{background:var(--cat);color:#000;border-bottom-right-radius:4px}
.msg-ai .msg-bubble{background:var(--s2);color:var(--t1);border-bottom-left-radius:4px;border:1px solid var(--b1)}
.msg-ai .msg-bubble b,.msg-ai .msg-bubble strong{color:var(--cat)}
.msg-avatar{
  width:28px;height:28px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:12px;background:var(--s3);
}
.typing-dots span{display:inline-block;animation:blink 1.2s infinite;font-size:18px;line-height:1}
.typing-dots span:nth-child(2){animation-delay:.2s}
.typing-dots span:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,80%,100%{opacity:.2}40%{opacity:1}}
.chat-input-row{
  display:flex;gap:8px;padding-top:12px;
  border-top:1px solid var(--b1);
}
.chat-in{
  flex:1;background:var(--s2);border:1px solid var(--b1);
  border-radius:10px;padding:12px 14px;
  font-size:13px;color:var(--t1);outline:none;
  resize:none;max-height:120px;font-family:var(--font);
  transition:border-color .15s;
}
.chat-in::placeholder{color:var(--t3)}
.chat-in:focus{border-color:var(--b2)}
.chat-send{
  flex-shrink:0;background:var(--cat);color:#000;
  border:none;border-radius:10px;padding:12px 16px;
  font-size:13px;font-weight:700;cursor:pointer;
  transition:opacity .15s;
}
.chat-send:disabled{opacity:.4;cursor:not-allowed}
.no-key-msg{
  text-align:center;padding:32px 16px;
  background:var(--s1);border:1px solid var(--b1);border-radius:12px;
  color:var(--t2);font-size:13px;
}
.no-key-msg button{
  display:block;margin:12px auto 0;
  background:var(--s2);border:1px solid var(--b2);
  color:var(--t1);border-radius:8px;padding:9px 20px;
  font-size:13px;cursor:pointer;
}

/* SETTINGS MODAL */
.modal-bg{
  position:fixed;inset:0;background:rgba(0,0,0,.75);
  z-index:80;display:none;align-items:flex-end;
  padding:env(safe-area-inset-bottom,0);
}
.modal-bg.open{display:flex}
.modal{
  width:100%;background:var(--s1);border-top:1px solid var(--b1);
  border-radius:16px 16px 0 0;padding:20px 20px calc(20px + env(safe-area-inset-bottom,0));
  max-width:600px;margin:0 auto;
}
.modal h2{font-size:16px;font-weight:700;margin-bottom:16px}
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;color:var(--t3);margin-bottom:6px;font-weight:600;letter-spacing:.04em;text-transform:uppercase}
.field input{
  width:100%;background:var(--s2);border:1px solid var(--b1);
  border-radius:8px;padding:10px 12px;
  font-size:13px;color:var(--t1);outline:none;font-family:var(--mono);
}
.field input:focus{border-color:var(--b2)}
.modal-actions{display:flex;gap:8px;margin-top:8px}
.btn{
  flex:1;padding:12px;border-radius:8px;font-size:13px;
  font-weight:600;cursor:pointer;border:none;transition:all .15s;
}
.btn-primary{background:var(--green);color:#000}
.btn-secondary{background:var(--s2);color:var(--t2);border:1px solid var(--b1)}
.field .hint{font-size:11px;color:var(--t3);margin-top:5px}

/* TOAST */
#toast{
  position:fixed;bottom:calc(20px + env(safe-area-inset-bottom,0));left:50%;
  transform:translateX(-50%) translateY(60px);
  background:var(--s3);border:1px solid var(--b2);
  border-radius:8px;padding:9px 18px;font-size:13px;color:var(--t1);
  opacity:0;transition:all .22s;pointer-events:none;white-space:nowrap;z-index:99;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<header>
  <div class="logo">last<em>30</em>days</div>
  <div class="hdr-right">
    <div class="sync-dot" id="sync-dot" title="Data freshness"></div>
    <button class="settings-btn" onclick="openSettings()">⚙</button>
  </div>
</header>

<div class="ticker" id="ticker"><span class="ticker-err">Fetching prices…</span></div>

<nav class="tabs" id="tabs"></nav>

<main id="main"></main>

<!-- Settings Modal -->
<div class="modal-bg" id="settings-modal" onclick="closeSettings(event)">
  <div class="modal">
    <h2>Settings</h2>
    <div class="field">
      <label>Anthropic API Key</label>
      <input type="password" id="sk-input" placeholder="sk-ant-…">
      <div class="hint">Stored locally in your browser. Get one at console.anthropic.com</div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeSettings()">Cancel</button>
      <button class="btn btn-primary" onclick="saveSettings()">Save</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ── DATA ──────────────────────────────────────────────────────────────────────
const CAT_ORDER = ["crypto","video_clients","ntc","personal_brand","chat"];
const CAT_COLORS = {
  crypto:"#00ff88", video_clients:"#4488ff",
  ntc:"#ff8844", personal_brand:"#cc44ff", chat:"#888"
};
const CAT_LABELS = {
  crypto:"Crypto", video_clients:"Video Clients",
  ntc:"New Terrain", personal_brand:"Personal Brand", chat:"💬 Chat"
};

let data = null;
let activeCat = "crypto";
let chatHistory = [];
let chatPending = false;

// ── BOOT ──────────────────────────────────────────────────────────────────────
async function boot() {
  loadTicker();
  try {
    const r = await fetch("data.json?" + Date.now());
    data = await r.json();
    const gen = new Date(data.generated_at);
    const ageH = (Date.now() - gen) / 36e5;
    document.getElementById("sync-dot").className = "sync-dot" + (ageH > 24 ? " stale" : "");
  } catch {
    data = { categories:{}, files:[], generated_at: new Date().toISOString() };
  }
  renderTabs();
  renderTab(activeCat);
}

// ── TICKER ────────────────────────────────────────────────────────────────────
const COINS = [
  {id:"bitcoin",sym:"BTC"},
  {id:"ethereum",sym:"ETH"},
  {id:"solana",sym:"SOL"},
  {id:"chainlink",sym:"LINK"},
  {id:"sui",sym:"SUI"},
  {id:"tron",sym:"TRX"},
];

async function loadTicker() {
  const ids = COINS.map(c=>c.id).join(",");
  try {
    const r = await fetch(
      `https://api.coingecko.com/api/v3/simple/price?ids=${ids}&vs_currencies=usd&include_24hr_change=true`
    );
    const p = await r.json();
    renderTicker(p);
  } catch {
    document.getElementById("ticker").innerHTML = '<span class="ticker-err">Price data unavailable</span>';
  }
}

function renderTicker(p) {
  const el = document.getElementById("ticker");
  el.innerHTML = COINS.map(c => {
    const d = p[c.id];
    if (!d) return "";
    const price = d.usd >= 1000 ? "$" + d.usd.toLocaleString("en-US",{maximumFractionDigits:0})
                : d.usd >= 1   ? "$" + d.usd.toFixed(2)
                :                "$" + d.usd.toPrecision(3);
    const chg = d.usd_24h_change;
    const cls = chg > 0.3 ? "chg-up" : chg < -0.3 ? "chg-dn" : "chg-flat";
    const sign = chg > 0 ? "+" : "";
    return `<div class="coin">
      <span class="coin-sym">${c.sym}</span>
      <span class="coin-price">${price}</span>
      <span class="coin-chg ${cls}">${sign}${chg.toFixed(1)}%</span>
    </div>`;
  }).join("");
}

// ── TABS ──────────────────────────────────────────────────────────────────────
function renderTabs() {
  const el = document.getElementById("tabs");
  el.innerHTML = CAT_ORDER.map(k => `
    <button class="tab${k===activeCat?" active":""}"
      style="--cat:${CAT_COLORS[k]}"
      onclick="switchTab('${k}')">${CAT_LABELS[k]}</button>
  `).join("");
}

function switchTab(key) {
  activeCat = key;
  document.querySelectorAll(".tab").forEach((t,i)=>{
    t.classList.toggle("active", CAT_ORDER[i]===key);
  });
  renderTab(key);
}

// ── RENDER CATEGORY ───────────────────────────────────────────────────────────
function renderTab(key) {
  document.documentElement.style.setProperty("--cat", CAT_COLORS[key]);
  if (key === "chat") { renderChat(); return; }
  const cat = (data?.categories||{})[key] || {};
  const files = (data?.files||[]).filter(f=>f.category===key);
  const sent = sentimentScore(files);

  document.getElementById("main").innerHTML = `
    <div class="sec-label">Sentiment — ${cat.name||key}</div>
    ${sentimentWidget(sent, files.length)}

    <div class="sec-label">Recent Research (${files.length})</div>
    ${files.length
      ? `<div class="research-list">${files.map((f,i)=>researchCard(f,i,fileSentiment(f))).join("")}</div>`
      : `<div class="empty"><strong>No research yet</strong>Use a prompt below to start</div>`
    }

    <div class="sec-label">Quick Prompts</div>
    <div class="prompt-grid">
      ${(cat.prompts||[]).map(p=>`
        <div class="p-row">
          <span class="p-text" onclick="copyText(this.nextElementSibling,'${escAttr(p)}')">${escHtml(p)}</span>
          <button class="p-copy" onclick="copyText(this,'${escAttr(p)}')">Copy</button>
        </div>
      `).join("")}
    </div>
    <div class="custom-wrap">
      <input class="custom-in" id="ci" placeholder="custom topic…" onkeydown="if(event.key==='Enter')customGo()">
      <button class="custom-go" onclick="customGo()">Copy /last30days →</button>
    </div>
  `;

  // wire up card toggles after render
  window._tabFiles = files;
}

// ── SENTIMENT ─────────────────────────────────────────────────────────────────
const BULL_WORDS = ["bullish","rally","strong","momentum","surge","pump","breakout","support","accumulate","gains","positive","optimistic","moon","green","buy"];
const BEAR_WORDS = ["bearish","dump","decline","sell","resistance","correction","crash","fud","fear","weak","drop","red","panic","concern"];

function fileSentiment(f) {
  const txt = (f.content||"").toLowerCase();
  const b = BULL_WORDS.reduce((s,w)=>s+(txt.split(w).length-1),0);
  const bd = BEAR_WORDS.reduce((s,w)=>s+(txt.split(w).length-1),0);
  if (b > bd*1.2) return "bull";
  if (bd > b*1.2) return "bear";
  return "neu";
}

function sentimentScore(files) {
  let bull=0, bear=0, neu=0;
  files.forEach(f => {
    const s = fileSentiment(f);
    if (s==="bull") bull++;
    else if (s==="bear") bear++;
    else neu++;
  });
  return {bull,bear,neu,total:files.length};
}

function sentimentWidget(s, total) {
  if (!total) {
    return `<div class="sentiment-row" style="justify-content:center;padding:20px">
      <span style="font-size:13px;color:var(--t3)">No data yet</span></div>`;
  }
  const pct = total ? Math.round(s.bull/total*100) : 0;
  const color = pct>=60?"var(--green)":pct<=35?"var(--red)":"var(--orange)";
  const word = pct>=60?"bullish":pct<=35?"bearish":"mixed";
  const donut = svgDonut(pct/100, s.bear/total, color);
  const barMax = Math.max(s.bull,s.bear,s.neu,1);
  return `<div class="sentiment-row">
    <div class="donut-wrap">
      ${donut}
      <div class="donut-label">
        <span class="donut-pct">${pct}%</span>
        <span class="donut-word">${word}</span>
      </div>
    </div>
    <div class="sentiment-info">
      <div class="sent-title">Across ${total} research file${total!==1?"s":""}</div>
      <div class="sent-bars">
        ${bar("Bullish","var(--green)",s.bull,barMax)}
        ${bar("Neutral","var(--t3)",s.neu,barMax)}
        ${bar("Bearish","var(--red)",s.bear,barMax)}
      </div>
    </div>
  </div>`;
}

function bar(label, color, val, max) {
  const pct = max>0?Math.round(val/max*100):0;
  return `<div class="sent-bar-row">
    <span class="sent-bar-label">${label}</span>
    <div class="sent-bar-track"><div class="sent-bar-fill" style="width:${pct}%;background:${color}"></div></div>
    <span class="sent-bar-count">${val}</span>
  </div>`;
}

function svgDonut(bullPct, bearPct, color) {
  const r=32,cx=36,cy=36,circ=2*Math.PI*r;
  const bullArc = circ*bullPct;
  const bearArc = circ*bearPct;
  const neuArc  = circ - bullArc - bearArc;
  let offset = circ/4;
  const seg = (len,col) => {
    const s = `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${col}"
      stroke-width="10" stroke-dasharray="${len} ${circ-len}"
      stroke-dashoffset="${offset}" transform="rotate(-90 ${cx} ${cy})"/>`;
    offset -= len;
    return s;
  };
  return `<svg viewBox="0 0 72 72">
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="var(--s2)" stroke-width="10"/>
    ${seg(bullArc,"var(--green)")}
    ${seg(bearArc,"var(--red)")}
    ${seg(neuArc,"var(--t3)")}
  </svg>`;
}

// ── RESEARCH CARDS ────────────────────────────────────────────────────────────
const SENT_META = {
  bull: { color:"var(--green)", label:"Bullish" },
  bear: { color:"var(--red)",   label:"Bearish" },
  neu:  { color:"var(--t3)",    label:"Neutral"  },
};

function researchCard(f, i, sent="neu") {
  const {color, label} = SENT_META[sent];
  return `<div class="r-card" id="rc-${i}">
    <div class="r-header" onclick="toggleCard(${i})">
      <div class="r-dot" style="background:${color}"></div>
      <div class="r-info">
        <div class="r-name">${escHtml(f.display_name)}
          <span style="font-size:10px;font-weight:600;padding:2px 6px;border-radius:4px;
            background:${color}22;color:${color};margin-left:6px;vertical-align:middle">${label}</span>
        </div>
        <div class="r-date">${f.date||"undated"} · ${f.filename}</div>
        <div class="r-preview">${escHtml(f.preview)}</div>
      </div>
      <div class="r-chev">▾</div>
    </div>
    <div class="r-body">
      <div class="r-content" id="rc-content-${i}"></div>
    </div>
  </div>`;
}

function toggleCard(i) {
  const card = document.getElementById("rc-"+i);
  const wasOpen = card.classList.contains("open");
  card.classList.toggle("open");
  if (!wasOpen) {
    const el = document.getElementById("rc-content-"+i);
    if (!el.innerHTML) el.textContent = (window._tabFiles[i]?.content||"").trim();
  }
}

// ── CHAT ──────────────────────────────────────────────────────────────────────
function renderChat() {
  const apiKey = localStorage.getItem("anthropic_key")||"";
  const main = document.getElementById("main");
  if (!apiKey) {
    main.innerHTML = `<div class="no-key-msg">
      <div>Add your Anthropic API key to enable the chat agent.</div>
      <div style="font-size:11px;color:var(--t3);margin-top:6px">The key is stored only in your browser.</div>
      <button onclick="openSettings()">Add API Key</button>
    </div>`;
    return;
  }

  const msgsHtml = chatHistory.length ? chatHistory.map(renderMsg).join("") :
    `<div class="msg msg-ai">
       <div class="msg-avatar">🤖</div>
       <div class="msg-bubble">Hey! I have your research on ${(data?.files||[]).length} topics loaded. Ask me anything — sentiment on a coin, summaries, what's trending in your files, or what to research next.</div>
     </div>`;

  main.innerHTML = `<div class="chat-wrap">
    <div class="chat-messages" id="chat-msgs">${msgsHtml}</div>
    <div class="chat-input-row">
      <textarea class="chat-in" id="chat-in" rows="1" placeholder="Ask about your research…"
        onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendChat()}"
        oninput="this.style.height='auto';this.style.height=Math.min(this.scrollHeight,120)+'px'"></textarea>
      <button class="chat-send" id="chat-send" onclick="sendChat()">↑</button>
    </div>
  </div>`;

  scrollChat();
}

function renderMsg(m) {
  const cls = m.role==="user"?"msg-you":"msg-ai";
  const avatar = m.role==="user"?"👤":"🤖";
  return `<div class="msg ${cls}">
    ${m.role!=="user"?`<div class="msg-avatar">${avatar}</div>`:""}
    <div class="msg-bubble">${escHtml(m.content)}</div>
    ${m.role==="user"?`<div class="msg-avatar">${avatar}</div>`:""}
  </div>`;
}

function scrollChat() {
  const el = document.getElementById("chat-msgs");
  if (el) el.scrollTop = el.scrollHeight;
}

async function sendChat() {
  if (chatPending) return;
  const inp = document.getElementById("chat-in");
  const msg = inp?.value.trim();
  if (!msg) return;

  const apiKey = localStorage.getItem("anthropic_key")||"";
  if (!apiKey) { openSettings(); return; }

  inp.value = "";
  inp.style.height = "auto";
  chatHistory.push({role:"user", content:msg});
  chatPending = true;

  // Append user bubble + typing indicator
  const msgsEl = document.getElementById("chat-msgs");
  msgsEl.insertAdjacentHTML("beforeend", renderMsg({role:"user",content:msg}));
  msgsEl.insertAdjacentHTML("beforeend",
    `<div class="msg msg-ai" id="typing">
       <div class="msg-avatar">🤖</div>
       <div class="msg-bubble"><span class="typing-dots"><span>.</span><span>.</span><span>.</span></span></div>
     </div>`);
  scrollChat();
  document.getElementById("chat-send").disabled = true;

  const system = buildSystemPrompt();
  try {
    const res = await fetch("/api/chat", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({messages: chatHistory, system})
    });
    const json = await res.json();
    const reply = json.reply || json.error || "Something went wrong.";
    chatHistory.push({role:"assistant", content:reply});
    document.getElementById("typing")?.remove();
    msgsEl.insertAdjacentHTML("beforeend", renderMsg({role:"assistant",content:reply}));
  } catch(e) {
    document.getElementById("typing")?.remove();
    msgsEl.insertAdjacentHTML("beforeend",
      `<div class="msg msg-ai"><div class="msg-avatar">🤖</div>
       <div class="msg-bubble" style="color:var(--red)">Error: ${e.message}</div></div>`);
  }

  chatPending = false;
  document.getElementById("chat-send").disabled = false;
  scrollChat();
}

function buildSystemPrompt() {
  const files = data?.files || [];
  const today = new Date().toISOString().split("T")[0];
  const researchDump = files.slice(0, 20).map(f =>
    `### ${f.display_name} (${f.date||"undated"})\n${(f.content||"").slice(0, 2000)}`
  ).join("\n\n---\n\n");

  return `You are a personal research analyst for Jadon Cal Fitzpatrick, founder of New Terrain Creative (LA video production agency) and active crypto trader.

Today's date: ${today}

You have access to his last30days research archive (${files.length} files). Answer questions about trends, sentiment, opportunities, and what to research next. Be direct, specific, and cite your sources by file name when relevant.

RESEARCH ARCHIVE:
${researchDump || "No research files yet."}`;
}

// ── SETTINGS ──────────────────────────────────────────────────────────────────
function openSettings() {
  const inp = document.getElementById("sk-input");
  inp.value = localStorage.getItem("anthropic_key")||"";
  document.getElementById("settings-modal").classList.add("open");
}
function closeSettings(e) {
  if (!e || e.target===document.getElementById("settings-modal"))
    document.getElementById("settings-modal").classList.remove("open");
}
function saveSettings() {
  const val = document.getElementById("sk-input").value.trim();
  if (val) localStorage.setItem("anthropic_key", val);
  else localStorage.removeItem("anthropic_key");
  document.getElementById("settings-modal").classList.remove("open");
  toast("Settings saved");
  if (activeCat==="chat") renderChat();
}

// ── UTILS ─────────────────────────────────────────────────────────────────────
function copyText(btn, text) {
  navigator.clipboard.writeText(text).then(()=>{
    btn.classList.add("ok");
    const orig = btn.textContent;
    btn.textContent = "✓";
    toast("Copied — paste into Claude Code");
    setTimeout(()=>{ btn.textContent=orig; btn.classList.remove("ok"); }, 1800);
  });
}
function customGo() {
  const v = document.getElementById("ci")?.value.trim();
  if (!v) return;
  copyText(document.querySelector(".custom-go"), "/last30days "+v);
}
function toast(msg) {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.classList.add("show");
  setTimeout(()=>el.classList.remove("show"), 2200);
}
function escHtml(s){ return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;") }
function escAttr(s){ return String(s||"").replace(/\\/g,"\\\\").replace(/'/g,"\\'") }

boot();
</script>
